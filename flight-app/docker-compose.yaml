version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: flight-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: flight_admin
      MONGO_INITDB_ROOT_PASSWORD: flight_secret
      MONGO_INITDB_DATABASE: flight_app
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - flight-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: flight-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://flight_admin:flight_secret@mongodb:27017/
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - flight-net

  backend:
    build: ./backend
    container_name: flight-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://flight_admin:flight_secret@mongodb:27017/flight_app?authSource=admin
      MONGO_DB: flight_app
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - flight-net
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    container_name: flight-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - flight-net

networks:
  flight-net:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
